<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 — Lost in the Void | CraftexSMP</title>
<meta name="description" content="The dimension you're looking for doesn't exist — or has been corrupted. Return to the overworld.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://craftex.rexd.space/404">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%232bd9e0'/%3E%3Cstop offset='50%25' stop-color='%233fdca0'/%3E%3Cstop offset='100%25' stop-color='%232ecc71'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='32,4 56,20 32,56 8,20' fill='url(%23g)'/%3E%3Cpolygon points='32,4 56,20 32,36 8,20' fill='%23fff' opacity='.15'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian-0:#04060b;
  --obsidian-1:#070b14;
  --obsidian-2:#0c1320;
  --midnight:#0e1626;
  --slate:#1a2436;
  --line:rgba(140,170,200,.14);
  --line-soft:rgba(140,170,200,.07);
  --cyan:#2bd9e0;
  --cyan-soft:#7cf5e8;
  --green:#2ecc71;
  --green-deep:#168f4c;
  --grad-brand:linear-gradient(135deg,var(--cyan) 0%,#3fdca0 48%,var(--green) 100%);
  --grad-brand-soft:linear-gradient(135deg,rgba(43,217,224,.18),rgba(46,204,113,.18));
  --gold:#e8b339;
  --white:#f2f7fb;
  --mute:#93a6bd;
  --mute-2:#7a8da8;
  --radius-s:6px;
  --radius-m:14px;
  --radius-l:26px;
  --ease:cubic-bezier(.22,.9,.3,1);
  --ease-snap:cubic-bezier(.6,0,.1,1);
  --font-display:'Oxanium',sans-serif;
  --font-body:'Oxanium',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
}
html,body{height:100%;background:var(--obsidian-1);color:var(--white);font-family:var(--font-body);overflow-x:hidden}
body{
  min-height:100svh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(43,217,224,.08),transparent 60%),radial-gradient(ellipse 60% 40% at 20% 80%,rgba(46,204,113,.06),transparent 55%),radial-gradient(ellipse 50% 35% at 80% 70%,rgba(43,217,224,.04),transparent 50%),var(--obsidian-1);
  padding:24px;position:relative
}
a{color:inherit;text-decoration:none}
::selection{background:rgba(43,217,224,.35);color:#fff}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--obsidian-0)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--cyan),var(--green));border-radius:8px}

.void-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4}
.void-glitch{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(43,217,224,.015) 2px,rgba(43,217,224,.015) 4px);opacity:.5}

.fallback-card{
  position:relative;z-index:2;
  width:100%;max-width:560px;
  text-align:center;
  background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.012));
  border:1px solid var(--line);
  border-radius:var(--radius-l);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:64px 48px 56px;
  animation:cardIn .8s var(--ease-snap) both;
}
@keyframes cardIn{0%{opacity:0;transform:translateY(30px) scale(.96)}100%{opacity:1;transform:translateY(0) scale(1)}}

.error-code{
  font-family:var(--font-display);font-weight:800;
  font-size:clamp(100px,20vw,160px);
  line-height:1;
  letter-spacing:-.04em;
  background:var(--grad-brand);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  position:relative;
  filter:drop-shadow(0 0 40px rgba(43,217,224,.3));
  animation:errPulse 4s ease-in-out infinite;
}
@keyframes errPulse{0%,100%{filter:drop-shadow(0 0 40px rgba(43,217,224,.3))}50%{filter:drop-shadow(0 0 60px rgba(43,217,224,.55))}}

.error-glyph{
  display:flex;justify-content:center;gap:20px;margin-bottom:8px;
}
.error-glyph .block{
  width:clamp(32px,6vw,48px);height:clamp(32px,6vw,48px);
  background:var(--grad-brand);
  clip-path:polygon(15% 0%,100% 0%,85% 100%,0% 100%);
  opacity:.25;
  animation:blockDrift 6s ease-in-out infinite;
}
.error-glyph .block:nth-child(2){animation-delay:.4s;opacity:.35}
.error-glyph .block:nth-child(3){animation-delay:.8s;opacity:.2}
.error-glyph .block:nth-child(4){animation-delay:1.2s;opacity:.3}
.error-glyph .block:nth-child(5){animation-delay:.6s;opacity:.25}
@keyframes blockDrift{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(8deg)}}

.error-title{
  font-family:var(--font-display);font-weight:700;
  font-size:clamp(20px,3.4vw,30px);
  margin-top:8px;letter-spacing:-.01em;
}
.error-desc{
  color:var(--mute);
  font-size:clamp(14px,1.8vw,16px);
  line-height:1.65;
  margin-top:14px;
  max-width:400px;margin-left:auto;margin-right:auto;
}

.error-actions{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  margin-top:36px;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:10px;padding:16px 30px;
  font-family:var(--font-body);font-weight:600;font-size:15px;letter-spacing:.01em;
  border-radius:var(--radius-s);position:relative;isolation:isolate;
  transition:transform .35s var(--ease),box-shadow .35s var(--ease);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px) scale(.99)}
.btn-primary{
  background:var(--grad-brand);color:#03130d;font-weight:700;
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
  box-shadow:0 0 0 rgba(43,217,224,0);
}
.btn-primary:hover{box-shadow:0 8px 30px -6px rgba(43,217,224,.55);transform:translateY(-2px)}
.btn-ghost{
  background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--white);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
}
.btn-ghost:hover{border-color:rgba(124,245,232,.5);background:rgba(124,245,232,.06);transform:translateY(-2px)}
.btn svg{width:18px;height:18px;flex-shrink:0}

.error-footer{
  margin-top:48px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;
  color:var(--mute-2);
}
.error-footer span{color:var(--cyan-soft)}

.redirect-timer{
  margin-top:16px;
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.08em;
  color:var(--mute-2);
}
.redirect-timer span{
  color:var(--cyan-soft);
  font-weight:600;
  display:inline-block;
  min-width:20px;
}

.corner-block{
  position:absolute;
  width:20px;height:20px;
  border-color:var(--line);border-style:solid;
  opacity:.5;
}
.corner-block.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:8px 0 0 0}
.corner-block.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;border-radius:0 8px 0 0}
.corner-block.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;border-radius:0 0 0 8px}
.corner-block.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 8px 0}

.void-portal{
  position:fixed;bottom:-20%;left:50%;transform:translateX(-50%);
  width:80vmax;height:80vmax;max-width:700px;max-height:700px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(43,217,224,.06),rgba(46,204,113,.03) 40%,transparent 65%);
  filter:blur(40px);
  z-index:0;pointer-events:none;
  animation:portalBreath 7s ease-in-out infinite;
}
@keyframes portalBreath{0%,100%{transform:translateX(-50%) scale(1);opacity:.6}50%{transform:translateX(-50%) scale(1.15);opacity:1}}

.floating-particle{
  position:fixed;z-index:1;pointer-events:none;
  width:3px;height:3px;
  background:var(--cyan-soft);
  border-radius:50%;
  opacity:0;
  animation:particleFloat 8s ease-in-out infinite;
}
.floating-particle:nth-child(1){left:12%;top:20%;animation-delay:0s;animation-duration:7s}
.floating-particle:nth-child(2){left:85%;top:35%;animation-delay:1.2s;animation-duration:9s}
.floating-particle:nth-child(3){left:25%;top:75%;animation-delay:2.5s;animation-duration:8s}
.floating-particle:nth-child(4){left:75%;top:80%;animation-delay:.6s;animation-duration:10s}
.floating-particle:nth-child(5){left:50%;top:15%;animation-delay:3.2s;animation-duration:7.5s}
.floating-particle:nth-child(6){left:8%;top:55%;animation-delay:1.8s;animation-duration:8.5s}
.floating-particle:nth-child(7){left:92%;top:60%;animation-delay:4s;animation-duration:9.5s}
@keyframes particleFloat{
  0%{opacity:0;transform:translateY(0) scale(0)}
  15%{opacity:.5;transform:translateY(-20px) scale(1)}
  50%{opacity:.3;transform:translateY(-60px) scale(.8)}
  85%{opacity:.5;transform:translateY(-100px) scale(1.1)}
  100%{opacity:0;transform:translateY(-130px) scale(0)}
}

@media(max-width:600px){
  .fallback-card{padding:44px 24px 36px;border-radius:20px}
  .error-actions{gap:10px;margin-top:28px}
  .error-actions .btn{padding:13px 22px;font-size:14px;white-space:normal}
  .error-desc{margin-top:12px}
  .error-footer{margin-top:36px;font-size:10px}
  .corner-block{width:14px;height:14px}
}
@media(max-width:400px){
  .fallback-card{padding:32px 16px 28px;border-radius:16px}
  .error-actions{flex-direction:column;align-items:stretch}
  .error-actions .btn{width:100%}
}
</style>
</head>
<body>

<div class="void-portal"></div>
<div class="void-glitch"></div>

<div class="floating-particle"></div>
<div class="floating-particle"></div>
<div class="floating-particle"></div>
<div class="floating-particle"></div>
<div class="floating-particle"></div>
<div class="floating-particle"></div>
<div class="floating-particle"></div>

<div class="fallback-card">
  <span class="corner-block tl"></span>
  <span class="corner-block tr"></span>
  <span class="corner-block bl"></span>
  <span class="corner-block br"></span>

  <div class="error-glyph">
    <span class="block"></span>
    <span class="block"></span>
    <span class="block"></span>
    <span class="block"></span>
    <span class="block"></span>
  </div>

  <div class="error-code">404</div>

  <h1 class="error-title">Lost in the Void</h1>

  <p class="error-desc">
    The chunk you're looking for failed to load — or never existed. This dimension has been corrupted beyond recognition.
  </p>

  <div class="error-actions">
    <a href="/" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 4l9 5.5"/><path d="M5 10v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/><path d="M9 21V12h6v9"/></svg>
      Return to Spawn
    </a>
    <a href="javascript:history.back()" class="btn btn-ghost">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
      Go Back
    </a>
  </div>

  <div class="error-footer">
    <span>--></span> seed: <span>0x404_craftex</span> <span>&lt;--</span>
  </div>
  <div class="redirect-timer">Redirecting to spawn in <span id="countdown">30</span>s</div>
</div>

<script>
(function(){
  var seconds = 30;
  var el = document.getElementById('countdown');
  var interval = setInterval(function(){
    seconds--;
    if(el) el.textContent = seconds;
    if(seconds <= 0){
      clearInterval(interval);
      window.location.href = '/';
    }
  }, 1000);
})();
</script>

</body>
</html>
